upstream php_fpm {
    # If Nginx and PHP-FPM are in the same container:
    server 127.0.0.1:9000 max_fails=3 fail_timeout=5s;

    keepalive 32;
}

server {
    listen 80 default_server;
    server_name _;

    root /var/www/html;
    index index.php index.html;

    charset utf-8;

    access_log /var/log/nginx/access.log main_ext;
    error_log /var/log/nginx/error.log warn;

    limit_conn per_ip_conn 30;

    # Useful debug/cache visibility.
    add_header X-Cache $upstream_cache_status always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Health check endpoint for Kubernetes.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Block direct access to sensitive files.
    location ~* /(wp-config\.php|readme\.html|license\.txt|composer\.(json|lock)|package(-lock)?\.json|yarn\.lock|\.env|\.git|\.svn) {
        deny all;
    }

    # Block PHP execution in writable/upload directories.
    location ~* ^/wp-content/uploads/.*\.php$ {
        deny all;
    }

    location ~* ^/wp-content/cache/.*\.php$ {
        deny all;
    }

    location ~* ^/wp-content/upgrade/.*\.php$ {
        deny all;
    }

    # Block hidden files except ACME challenge.
    location ~ /\.(?!well-known) {
        deny all;
    }

    # Static assets.
    location ~* \.(?:css|js|mjs|map|jpg|jpeg|gif|png|webp|avif|svg|ico|cur|woff|woff2|ttf|eot|otf|mp4|webm|ogg|ogv|pdf|zip)$ {
        access_log off;
        log_not_found off;

        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        add_header X-Content-Type-Options nosniff always;

        try_files $uri =404;
    }

    # WordPress login: strict rate limit.
    location = /wp-login.php {
        limit_req zone=protected_routes burst=5 nodelay;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;

        # Important: after real_ip_header, this is the real client IP.
        fastcgi_param REMOTE_ADDR $remote_addr;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;

        fastcgi_pass php_fpm;
        fastcgi_index index.php;

        fastcgi_read_timeout 120s;
        fastcgi_send_timeout 120s;

        fastcgi_buffer_size 64k;
        fastcgi_buffers 16 64k;
        fastcgi_busy_buffers_size 128k;
        fastcgi_temp_file_write_size 256k;

        fastcgi_no_cache 1;
        fastcgi_cache_bypass 1;
    }

    # XML-RPC is commonly abused. Keep blocked unless you specifically need Jetpack,
    # the WordPress mobile app, or external XML-RPC publishing.
    location = /xmlrpc.php {
        limit_req zone=protected_routes burst=3 nodelay;
        include /etc/nginx/conf.d/generated_xmlrpc_route.conf;
    }

    # wp-cron should ideally be called by real cron/Kubernetes CronJob, not public traffic.
    location = /wp-cron.php {
        limit_req zone=protected_routes burst=3 nodelay;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        fastcgi_param REMOTE_ADDR $remote_addr;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;

        fastcgi_pass php_fpm;
        fastcgi_no_cache 1;
        fastcgi_cache_bypass 1;
    }

    # REST API: useful, but can be expensive. Rate limit it separately.
    location ^~ /wp-json/ {
        limit_req zone=api_routes burst=30 nodelay;
        try_files $uri $uri/ /index.php?$args;
    }

    location ~* ^/wp-admin/.*\.php$ {
        limit_req zone=protected_routes burst=20 nodelay;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        fastcgi_param REMOTE_ADDR $remote_addr;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST $host;
        fastcgi_pass php_fpm;
        fastcgi_index index.php;
        fastcgi_no_cache 1;
        fastcgi_cache_bypass 1;
    }

    # WordPress admin.
    location /wp-admin/ {
        limit_req zone=protected_routes burst=20 nodelay;
        try_files $uri $uri/ /index.php?$args;
    }

    # Main public routes.
    location / {
        limit_req zone=normal_routes burst=50 nodelay;
        try_files $uri $uri/ /index.php?$args;
    }

    # PHP handling.
    location ~ \.php$ {
        limit_req zone=normal_routes burst=50 nodelay;

        try_files $fastcgi_script_name =404;

        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;

        # Make PHP/WordPress see the real client IP.
        fastcgi_param REMOTE_ADDR $remote_addr;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST $host;

        fastcgi_pass php_fpm;
        fastcgi_index index.php;

        fastcgi_read_timeout 120s;
        fastcgi_send_timeout 120s;
        fastcgi_connect_timeout 10s;

        fastcgi_buffering on;
        fastcgi_buffer_size 64k;
        fastcgi_buffers 16 64k;
        fastcgi_busy_buffers_size 128k;
        fastcgi_temp_file_write_size 256k;

        # Full-page cache for anonymous GET/HEAD WordPress pages.
        fastcgi_cache WORDPRESS;
        include /etc/nginx/conf.d/generated_fastcgi_cache.conf;

        # This lets Nginx cache WordPress pages even if WordPress sends conservative cache headers.
        # The skip-cache rules above protect logged-in/admin/cart/etc.
        fastcgi_ignore_headers Cache-Control Expires;

        add_header X-Cache $upstream_cache_status always;
    }
}