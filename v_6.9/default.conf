upstream php_fpm {
    # Nginx and PHP-FPM share the same container.
    server 127.0.0.1:9000 max_fails=3 fail_timeout=5s;
    keepalive 32;
}

server {
    listen 80 default_server;
    server_name _;

    root /var/www/html;
    index index.php index.html;

    charset utf-8;

    access_log /var/log/nginx/access.log main_ext;
    error_log /var/log/nginx/error.log warn;

    # Per-IP connection limit (configurable via RATE_LIMIT_MAX_CONN_PER_IP).
    include /etc/nginx/conf.d/generated_server_overrides.conf;

    # Static security headers.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security $hsts_header always;

    # Dynamic security headers: CSP (and X-Cache when DEBUG_HEADERS=true).
    include /etc/nginx/conf.d/generated_security_headers.conf;

    # Health check endpoint for Kubernetes (nginx-only, no FPM dependency).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # --- Block sensitive files ---

    location ~* /(wp-config\.php|readme\.html|license\.txt|composer\.(json|lock)|package(-lock)?\.json|yarn\.lock|\.env|\.git|\.svn) {
        deny all;
    }

    # WordPress debug log — often contains DB credentials and stack traces.
    location ~* /wp-content/debug\.log {
        deny all;
    }

    location = /wp-config-sample.php {
        deny all;
    }

    # Apache leftover files — not used by nginx but may contain sensitive data.
    location ~* /\.(htaccess|htpasswd|user\.ini) {
        deny all;
    }

    # Plugin/theme readme files expose exact version numbers to scanners.
    location ~* /wp-content/(plugins|themes)/[^/]+/readme\.(txt|html|md)$ {
        deny all;
    }

    # wp-includes PHP files should never be called directly over HTTP.
    location ~* ^/wp-includes/.*\.php$ {
        deny all;
    }

    # Block PHP execution in writable/upload directories.
    location ~* ^/wp-content/uploads/.*\.php$ {
        deny all;
    }
    location ~* ^/wp-content/cache/.*\.php$ {
        deny all;
    }
    location ~* ^/wp-content/upgrade/.*\.php$ {
        deny all;
    }

    # Block hidden files except ACME challenge.
    location ~ /\.(?!well-known) {
        deny all;
    }

    # --- Static assets ---

    # Long-lived immutable assets (30 days).
    location ~* \.(?:css|js|mjs|map|jpg|jpeg|gif|png|webp|avif|svg|ico|cur|woff|woff2|ttf|eot|otf|mp4|webm|ogg|ogv|pdf|zip|webmanifest|wasm)$ {
        access_log off;
        log_not_found off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # XML and text files — short cache (sitemaps regenerate frequently; robots.txt must be fresh).
    # Falls through to WordPress for dynamically generated sitemaps.
    location ~* \.(xml|txt)$ {
        access_log off;
        expires 1h;
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri /index.php?$args;
    }

    # --- Protected WordPress routes ---

    # wp-login: strict rate limit, always bypass cache.
    location = /wp-login.php {
        limit_req zone=protected_routes burst=5 nodelay;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        fastcgi_param REMOTE_ADDR $remote_addr;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;

        fastcgi_pass php_fpm;
        fastcgi_index index.php;

        fastcgi_read_timeout 120s;
        fastcgi_send_timeout 120s;
        fastcgi_buffer_size 64k;
        fastcgi_buffers 16 64k;
        fastcgi_busy_buffers_size 128k;
        fastcgi_temp_file_write_size 256k;

        fastcgi_no_cache 1;
        fastcgi_cache_bypass 1;
    }

    # XML-RPC: blocked by default, enable via XMLRPC_ENABLED=true.
    location = /xmlrpc.php {
        limit_req zone=protected_routes burst=3 nodelay;
        include /etc/nginx/conf.d/generated_xmlrpc_route.conf;
    }

    # wp-cron: restricted to 127.0.0.1 by default (DISABLE_PUBLIC_WP_CRON=true).
    # Override with DISABLE_PUBLIC_WP_CRON=false to allow public access.
    include /etc/nginx/conf.d/generated_wp_cron.conf;

    # REST API: rate-limited separately; cache bypass is handled by $skip_cache_uri map.
    location ^~ /wp-json/ {
        limit_req zone=api_routes burst=30 nodelay;
        try_files $uri $uri/ /index.php?$args;
    }

    # wp-admin PHP files: bypass cache, apply protected rate limit.
    location ~* ^/wp-admin/.*\.php$ {
        limit_req zone=protected_routes burst=20 nodelay;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        fastcgi_param REMOTE_ADDR $remote_addr;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST $host;

        fastcgi_pass php_fpm;
        fastcgi_index index.php;

        fastcgi_no_cache 1;
        fastcgi_cache_bypass 1;
    }

    # wp-admin static resources.
    location /wp-admin/ {
        limit_req zone=protected_routes burst=20 nodelay;
        try_files $uri $uri/ /index.php?$args;
    }

    # Main public routes.
    location / {
        limit_req zone=normal_routes burst=50 nodelay;
        try_files $uri $uri/ /index.php?$args;
    }

    # Customer-injected nginx config (via NGINX_EXTRA_CONF).
    include /etc/nginx/conf.d/generated_extra.conf;

    # PHP handler — FastCGI cache applied here for anonymous GET/HEAD requests.
    location ~ \.php$ {
        limit_req zone=normal_routes burst=50 nodelay;

        try_files $fastcgi_script_name =404;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        fastcgi_param REMOTE_ADDR $remote_addr;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST $host;

        fastcgi_pass php_fpm;
        fastcgi_index index.php;

        fastcgi_read_timeout 120s;
        fastcgi_send_timeout 120s;
        fastcgi_connect_timeout 10s;

        fastcgi_buffering on;
        fastcgi_buffer_size 64k;
        fastcgi_buffers 16 64k;
        fastcgi_busy_buffers_size 128k;
        fastcgi_temp_file_write_size 256k;

        fastcgi_cache WORDPRESS;
        include /etc/nginx/conf.d/generated_fastcgi_cache.conf;

        # Let nginx manage cache TTL independently of whatever WordPress sets.
        # The skip-cache maps above protect logged-in/admin/cart/etc.
        fastcgi_ignore_headers Cache-Control Expires;

        # X-Cache header (controlled by DEBUG_HEADERS env var).
        include /etc/nginx/conf.d/generated_debug_headers.conf;
    }
}
