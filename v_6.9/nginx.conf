user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server_tokens off;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 30s;
    keepalive_requests 1000;

    client_body_timeout 15s;
    client_header_timeout 15s;
    send_timeout 30s;

    # client_max_body_size is set dynamically via MAX_UPLOAD_SIZE (generated_http_overrides.conf).

    client_body_buffer_size 256k;

    reset_timedout_connection on;

    types_hash_max_size 4096;
    server_names_hash_bucket_size 128;

    # Real client IP from Traefik / AWS private networks.
    # IMPORTANT: Replace these with your actual VPC, node, pod, or Traefik CIDRs if possible.
    # Do not use 0.0.0.0/0 here.
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    log_format main_ext
        '$remote_addr - $remote_user [$time_local] "$request" '
        '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
        'xff="$http_x_forwarded_for" realip="$realip_remote_addr" '
        'rt=$request_time uct="$upstream_connect_time" '
        'uht="$upstream_header_time" urt="$upstream_response_time" '
        'cache="$upstream_cache_status"';

    access_log /var/log/nginx/access.log main_ext;
    error_log /var/log/nginx/error.log warn;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # FastCGI full-page cache.
    fastcgi_cache_path /var/cache/nginx/wordpress
        levels=1:2
        keys_zone=WORDPRESS:256m
        inactive=60m
        max_size=2g
        use_temp_path=off;

    fastcgi_cache_key "$http_x_forwarded_proto|$request_method|$host|$request_uri";

    # Rate limit zones, client_max_body_size, and connection limit zone
    # are generated from environment variables at startup.
    include /etc/nginx/conf.d/generated_http_overrides.conf;

    # Optional connection limit per client IP.
    limit_conn_zone $binary_remote_addr zone=per_ip_conn:20m;

    limit_req_status 429;
    limit_conn_status 429;

    # HSTS: only set when the request arrived over HTTPS (Traefik sets X-Forwarded-Proto).
    map $http_x_forwarded_proto $hsts_header {
        https   "max-age=31536000; includeSubDomains";
        default "";
    }

    # Skip cache for unsafe methods.
    map $request_method $skip_cache_method {
        default 0;
        POST    1;
        PUT     1;
        PATCH   1;
        DELETE  1;
    }

    # Skip cache for logged-in users, commenters, carts, checkout sessions, password-protected posts.
    map $http_cookie $skip_cache_cookie {
        default 0;
        ~*wordpress_logged_in        1;
        ~*wordpress_sec              1;
        ~*wp-postpass                1;
        ~*comment_author             1;
        ~*woocommerce_items_in_cart  1;
        ~*woocommerce_cart_hash      1;
        ~*wp_woocommerce_session     1;
        ~*edd_items_in_cart          1;
    }

    # Skip cache for dynamic/protected WordPress routes.
    map $request_uri $skip_cache_uri {
        default 0;

        ~*^/wp-admin/               1;
        ~*^/wp-login\.php           1;
        ~*^/wp-cron\.php            1;
        ~*^/xmlrpc\.php             1;
        ~*^/wp-json/                1;
        ~*^/wc-api/                 1;

        ~*^/cart/?                  1;
        ~*^/checkout/?              1;
        ~*^/my-account/?            1;
        ~*^/account/?               1;

        ~*preview=true              1;
        ~*customize_changeset_uuid  1;
        ~*elementor-preview         1;
        ~*wc-ajax=                  1;
        ~*add-to-cart=              1;
        ~*s=                        1;
    }

    map "$skip_cache_method$skip_cache_cookie$skip_cache_uri" $skip_cache {
        default 0;
        ~1      1;
    }

    include /etc/nginx/conf.d/default.conf;

    # Internal metrics server — bound to loopback only, never reachable from outside the pod.
    # Serves nginx stub_status, fpm-ping, fpm-status, and WordPress application metrics.
    server {
        listen 127.0.0.1:8080;
        server_name _;
        root /var/www/html;
        access_log off;

        location = /nginx_status {
            stub_status;
        }

        location = /fpm-ping {
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param SCRIPT_NAME     /fpm-ping;
            fastcgi_param REQUEST_URI     /fpm-ping;
            fastcgi_pass 127.0.0.1:9000;
        }

        location = /fpm-status {
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param SCRIPT_NAME     /fpm-status;
            fastcgi_param REQUEST_URI     /fpm-status;
            fastcgi_pass 127.0.0.1:9000;
        }

        location = /wp-metrics {
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /var/www/html/wp-metrics.php;
            fastcgi_param SCRIPT_NAME     /wp-metrics.php;
            fastcgi_param REQUEST_URI     /wp-metrics;
            fastcgi_pass 127.0.0.1:9000;
        }
    }
}
